# SSOO CI/CD 파이프라인
# verify(확인) → build(자동 빌드) → deploy(사람 버튼 배포)
# 배포는 manual: GitLab 에서 ▶ 버튼을 눌러야 실행됨
#
# 환경 구성:
#   development 브랜치 → development 환경 (lsiddms01)
#   (추후) 운영 브랜치  → production 환경 (별도 서버)

stages:
  - verify
  - build
  - deploy

variables:
  APP_DIR: "/opt/ssoo/app"

# 1단계: 동작 확인
verify:
  stage: verify
  tags:
    - ssoo
  script:
    - echo "=== 파이프라인 동작 확인 ==="
    - echo "푸시한 사람 - $GITLAB_USER_NAME"
    - echo "브랜치 - $CI_COMMIT_REF_NAME"
    - echo "커밋 - $CI_COMMIT_SHORT_SHA"
    - echo "메시지 - $CI_COMMIT_TITLE"
  rules:
    - if: '$CI_COMMIT_BRANCH == "development"'

# 2단계: 전체 이미지 빌드 (자동)
build:
  stage: build
  tags:
    - ssoo
  script:
    - echo "=== 전체 이미지 빌드 시작 ==="
    - cd "$APP_DIR"
    - git reset --hard "origin/$CI_COMMIT_REF_NAME"
    - docker compose build
    - echo "=== 빌드 완료 ==="
  rules:
    - if: '$CI_COMMIT_BRANCH == "development"'

# 3단계: development 환경 배포 (사람이 버튼 눌러야 실행)
deploy_dev:
  stage: deploy
  tags:
    - ssoo
  when: manual              # ← 핵심: 수동 승인 게이트
  environment:
    name: development
    url: http://10.125.12.170:3001
  script:
    - echo "=== development 배포 시작 ==="
    - cd "$APP_DIR"
    # 현재 이미지 백업 태깅 (롤백용)
    - |
      BACKUP_TAG="ci-backup-$(date +%Y%m%d_%H%M%S)"
      echo "백업 태그: $BACKUP_TAG"
      for svc in server pms dms cms admin db-init; do
        if docker image inspect "app-${svc}:latest" >/dev/null 2>&1; then
          docker tag "app-${svc}:latest" "app-${svc}:${BACKUP_TAG}"
          echo "  백업: app-${svc}:${BACKUP_TAG}"
        fi
      done
      echo "$BACKUP_TAG" > /tmp/ssoo-ci-last-backup-tag
    # 기동
    - docker compose up -d
    - echo "=== 60초 대기 후 health check ==="
    - sleep 60
    # health check
    - |
      ALL_OK=true
      for svc in postgres server pms dms cms admin; do
        st=$(docker inspect "ssoo-${svc}" --format '{{.State.Health.Status}}' 2>/dev/null || echo "n/a")
        echo "  ssoo-${svc}: $st"
        if [ "$st" != "healthy" ] && [ "$st" != "n/a" ]; then ALL_OK=false; fi
      done
      docker compose ps
      if [ "$ALL_OK" = "true" ]; then
        echo "=== 배포 성공 ==="
      else
        echo "=== 일부 서비스 unhealthy. 확인 필요 ==="
        exit 1
      fi
  rules:
    - if: '$CI_COMMIT_BRANCH == "development"'
