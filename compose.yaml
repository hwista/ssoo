name: ssoo

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: ssoo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ssoo_dev
      POSTGRES_USER: ssoo
      POSTGRES_PASSWORD: ssoo_dev_pw
    ports:
      - "5432:5432"
    volumes:
      - ssoo-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ssoo -d ssoo_dev"]
      interval: 5s
      timeout: 5s
      retries: 20

  db-init:
    build:
      context: .
      dockerfile: docker/db-init.Dockerfile
    container_name: ssoo-db-init
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://ssoo:ssoo_dev_pw@postgres:5432/ssoo_dev?schema=public}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: ssoo-server
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - path: ./.env
        required: false
      - path: ./apps/web/dms/.env.local
        required: false
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://ssoo:ssoo_dev_pw@postgres:5432/ssoo_dev?schema=public}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://localhost:3004}
      AUTH_PUBLIC_API_BASE_URL: ${AUTH_PUBLIC_API_BASE_URL:-http://localhost:4000/api}
      AUTH_TRUST_FORWARD_HEADERS: ${AUTH_TRUST_FORWARD_HEADERS:-false}
      AUTH_ALLOW_INSECURE_PRODUCTION_DEFAULTS: ${AUTH_ALLOW_INSECURE_PRODUCTION_DEFAULTS:-true}
      JWT_SECRET: ${JWT_SECRET:-development-jwt-secret-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-development-jwt-refresh-secret-change-me}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      AUTH_MICROSOFT_OAUTH_STATE_COOKIE_NAME: ${AUTH_MICROSOFT_OAUTH_STATE_COOKIE_NAME:-ssoo-ms-oauth-state}
      AUTH_OAUTH_STATE_SIGNING_SECRET: ${AUTH_OAUTH_STATE_SIGNING_SECRET:-}
      AUTH_CONFIG_ENCRYPTION_KEY: ${AUTH_CONFIG_ENCRYPTION_KEY:-change-me-auth-config-encryption-key-32chars}
      AUTH_DEFAULT_LOGIN_URL: ${AUTH_DEFAULT_LOGIN_URL:-http://localhost:3000/login}
      DMS_INSTANCE_ENV: ${DMS_INSTANCE_ENV:-prod}
      DMS_MARKDOWN_ROOT: ${DMS_MARKDOWN_ROOT:-/var/lib/ssoo/documents}
      DMS_INGEST_QUEUE_PATH: ${DMS_INGEST_QUEUE_PATH:-/var/lib/ssoo/document-ingest}
      DMS_STORAGE_LOCAL_BASE_PATH: ${DMS_STORAGE_LOCAL_BASE_PATH:-/var/lib/ssoo/document-storage/local}
      DMS_STORAGE_SHAREPOINT_BASE_PATH: ${DMS_STORAGE_SHAREPOINT_BASE_PATH:-/sites/documents/shared-documents}
      DMS_STORAGE_NAS_BASE_PATH: ${DMS_STORAGE_NAS_BASE_PATH:-/mnt/nas/documents}
      DMS_GIT_PROD_REMOTE_URL: ${DMS_GIT_PROD_REMOTE_URL:-http://10.125.31.72:8010/LSITC_WEB/LSWIKI_DOC.git}
      DMS_GIT_DEV_REMOTE_URL: ${DMS_GIT_DEV_REMOTE_URL:-git@10.125.31.72:LSITC_WEB/LSWIKI_DOC_DEV.git}
      DMS_GIT_BOOTSTRAP_REMOTE_URL: ${DMS_GIT_BOOTSTRAP_REMOTE_URL:-}
      DMS_GIT_BOOTSTRAP_BRANCH: ${DMS_GIT_BOOTSTRAP_BRANCH:-master}
      DMS_GIT_PUBLISH_IGNORED_PATH_PREFIXES: ${DMS_GIT_PUBLISH_IGNORED_PATH_PREFIXES:-launch-smoke/,codex-lock-ui/,codex-lock-probe/,verify-access/}
    volumes:
      - ${DMS_MARKDOWN_HOST_PATH:-./.runtime/documents}:${DMS_MARKDOWN_ROOT:-/var/lib/ssoo/documents}
      - ${DMS_INGEST_HOST_PATH:-./.runtime/document-ingest}:${DMS_INGEST_QUEUE_PATH:-/var/lib/ssoo/document-ingest}
      - ${DMS_STORAGE_LOCAL_HOST_PATH:-./.runtime/document-storage/local}:${DMS_STORAGE_LOCAL_BASE_PATH:-/var/lib/ssoo/document-storage/local}
    depends_on:
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/api/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 20

  pms:
    build:
      context: .
      dockerfile: apps/web/pms/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PMS_NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
        NEXT_PUBLIC_SNS_APP_URL: ${NEXT_PUBLIC_SNS_APP_URL:-http://localhost:3004}
        PMS_SERVER_API_URL: ${PMS_SERVER_API_URL:-http://server:4000/api}
    container_name: ssoo-pms
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      PORT: 3002
      NEXT_PUBLIC_API_URL: ${PMS_NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
      NEXT_PUBLIC_SNS_APP_URL: ${NEXT_PUBLIC_SNS_APP_URL:-http://localhost:3004}
      PMS_SERVER_API_URL: ${PMS_SERVER_API_URL:-http://server:4000/api}
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3002').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 20

  sns:
    build:
      context: .
      dockerfile: apps/web/sns/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${SNS_NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
        NEXT_PUBLIC_SNS_APP_URL: ${NEXT_PUBLIC_SNS_APP_URL:-http://localhost:3004}
        SNS_SERVER_API_URL: ${SNS_SERVER_API_URL:-http://server:4000/api}
    container_name: ssoo-sns
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      NODE_ENV: production
      PORT: 3004
      NEXT_PUBLIC_API_URL: ${SNS_NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
      NEXT_PUBLIC_SNS_APP_URL: ${NEXT_PUBLIC_SNS_APP_URL:-http://localhost:3004}
      SNS_SERVER_API_URL: ${SNS_SERVER_API_URL:-http://server:4000/api}
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3004').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 20

  dms:
    build:
      context: .
      dockerfile: apps/web/dms/Dockerfile
      args:
        NEXT_PUBLIC_SNS_APP_URL: ${NEXT_PUBLIC_SNS_APP_URL:-http://localhost:3004}
    container_name: ssoo-dms
    restart: unless-stopped
    ports:
      - "3003:3003"
    env_file:
      - path: ./apps/web/dms/.env.local
        required: false
    environment:
      NODE_ENV: production
      PORT: 3003
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://ssoo:ssoo_dev_pw@postgres:5432/ssoo_dev?schema=public}
      DMS_DATABASE_URL: ${DOCKER_DMS_DATABASE_URL:-postgresql://ssoo:ssoo_dev_pw@postgres:5432/ssoo_dev?schema=public}
      DMS_SERVER_API_URL: ${DMS_SERVER_API_URL:-http://server:4000/api}
      NEXT_PUBLIC_SNS_APP_URL: ${NEXT_PUBLIC_SNS_APP_URL:-http://localhost:3004}
    depends_on:
      postgres:
        condition: service_healthy
      server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3003').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 20

  admin:
    build:
      context: .
      dockerfile: apps/web/admin/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${ADMIN_NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
        ADMIN_SERVER_API_URL: ${ADMIN_SERVER_API_URL:-http://server:4000/api}
        NEXT_PUBLIC_SNS_APP_URL: ${NEXT_PUBLIC_SNS_APP_URL:-http://localhost:3004}
    container_name: ssoo-admin
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${ADMIN_NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
      ADMIN_SERVER_API_URL: ${ADMIN_SERVER_API_URL:-http://server:4000/api}
      NEXT_PUBLIC_SNS_APP_URL: ${NEXT_PUBLIC_SNS_APP_URL:-http://localhost:3004}
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 20


  crm:
    build:
      context: .
      dockerfile: apps/web/crm/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${CRM_NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
        CRM_SERVER_API_URL: ${CRM_SERVER_API_URL:-http://server:4000/api}
        NEXT_PUBLIC_SNS_APP_URL: ${NEXT_PUBLIC_SNS_APP_URL:-http://localhost:3004}
    container_name: ssoo-crm
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      NEXT_PUBLIC_API_URL: ${CRM_NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
      CRM_SERVER_API_URL: ${CRM_SERVER_API_URL:-http://server:4000/api}
      NEXT_PUBLIC_SNS_APP_URL: ${NEXT_PUBLIC_SNS_APP_URL:-http://localhost:3004}
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  ssoo-postgres-data:
