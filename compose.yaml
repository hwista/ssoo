services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: ssoo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ssoo_dev
      POSTGRES_USER: ssoo
      POSTGRES_PASSWORD: ssoo_dev_pw
    ports:
      - "5432:5432"
    volumes:
      - ssoo-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ssoo -d ssoo_dev"]
      interval: 5s
      timeout: 5s
      retries: 20

  db-init:
    build:
      context: .
      dockerfile: docker/db-init.Dockerfile
    container_name: ssoo-db-init
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://ssoo:ssoo_dev_pw@postgres:5432/ssoo_dev?schema=public}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: ssoo-server
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://ssoo:ssoo_dev_pw@postgres:5432/ssoo_dev?schema=public}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003}
      JWT_SECRET: ${JWT_SECRET:-development-jwt-secret-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-development-jwt-refresh-secret-change-me}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      DMS_MARKDOWN_ROOT: ${DMS_MARKDOWN_ROOT:-/var/lib/ssoo/dms/documents}
      DMS_INGEST_QUEUE_PATH: ${DMS_INGEST_QUEUE_PATH:-/var/lib/ssoo/dms/ingest}
      DMS_STORAGE_LOCAL_BASE_PATH: ${DMS_STORAGE_LOCAL_BASE_PATH:-/var/lib/ssoo/dms/storage/local}
      DMS_STORAGE_SHAREPOINT_BASE_PATH: ${DMS_STORAGE_SHAREPOINT_BASE_PATH:-/sites/dms/shared-documents}
      DMS_STORAGE_NAS_BASE_PATH: ${DMS_STORAGE_NAS_BASE_PATH:-/mnt/nas/dms}
    volumes:
      - ${DMS_MARKDOWN_HOST_PATH:-./.runtime/dms/documents}:${DMS_MARKDOWN_ROOT:-/var/lib/ssoo/dms/documents}
      - ${DMS_INGEST_HOST_PATH:-./.runtime/dms/ingest}:${DMS_INGEST_QUEUE_PATH:-/var/lib/ssoo/dms/ingest}
      - ${DMS_STORAGE_LOCAL_HOST_PATH:-./.runtime/dms/storage/local}:${DMS_STORAGE_LOCAL_BASE_PATH:-/var/lib/ssoo/dms/storage/local}
    depends_on:
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/api/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 20

  pms:
    build:
      context: .
      dockerfile: apps/web/pms/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PMS_NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
        PMS_SERVER_API_URL: ${PMS_SERVER_API_URL:-http://server:4000/api}
    container_name: ssoo-pms
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${PMS_NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
      PMS_SERVER_API_URL: ${PMS_SERVER_API_URL:-http://server:4000/api}
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 20

  cms:
    build:
      context: .
      dockerfile: apps/web/cms/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${CMS_NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
        CMS_SERVER_API_URL: ${CMS_SERVER_API_URL:-http://server:4000/api}
    container_name: ssoo-cms
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      PORT: 3002
      NEXT_PUBLIC_API_URL: ${CMS_NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
      CMS_SERVER_API_URL: ${CMS_SERVER_API_URL:-http://server:4000/api}
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3002').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 20

  dms:
    build:
      context: .
      dockerfile: apps/web/dms/Dockerfile
    container_name: ssoo-dms
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - path: ./apps/web/dms/.env.local
        required: false
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://ssoo:ssoo_dev_pw@postgres:5432/ssoo_dev?schema=public}
      DMS_DATABASE_URL: ${DOCKER_DMS_DATABASE_URL:-postgresql://ssoo:ssoo_dev_pw@postgres:5432/ssoo_dev?schema=public}
      DMS_SERVER_API_URL: ${DMS_SERVER_API_URL:-http://server:4000/api}
    depends_on:
      postgres:
        condition: service_healthy
      server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 20

  admin:
    build:
      context: .
      dockerfile: apps/web/admin/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${ADMIN_NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
    container_name: ssoo-admin
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: production
      PORT: 3003
      NEXT_PUBLIC_API_URL: ${ADMIN_NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3003').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  ssoo-postgres-data:
